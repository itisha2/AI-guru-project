services:
  - type: web
    name: ai-guru
    runtime: python
    region: oregon

    # Pre-download the embedding model during build so the first request is fast
    buildCommand: >
      pip install -r requirements.txt &&
      python -c "
      from sentence_transformers import SentenceTransformer;
      SentenceTransformer('sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2');
      print('Embedding model cached.')
      "

    # Ingest data then start the app
    startCommand: >
      python scripts/ingest_data.py &&
      streamlit run frontend/app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true

    # Persistent disk so ChromaDB and raw data survive redeploys
    disk:
      name: ai-guru-data
      mountPath: /opt/render/project/src/data
      sizeGB: 2

    envVars:
      - key: GROQ_API_KEY
        sync: false                         # set manually in Render dashboard

      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false                         # needed for embedding model download

      - key: LLM_MODEL
        value: gemma2-9b-it

      - key: EMBEDDING_MODEL
        value: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

      - key: PYTHON_VERSION
        value: "3.11"
